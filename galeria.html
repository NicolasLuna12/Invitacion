<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería - Lucre y Nico</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Great+Vibes&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cormorant Garamond', serif;
            background-color: #f5f1e8;
            color: #2a2a2a;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px 20px;
        }

        .title {
            font-family: 'Great Vibes', cursive;
            font-size: 64px;
            color: #c9a961;
            margin-bottom: 10px;
        }

        .subtitle {
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #2a2a2a;
        }

        .back-link {
            display: inline-block;
            margin: 20px 0;
            font-family: 'Montserrat', sans-serif;
            font-size: 12px;
            letter-spacing: 2px;
            color: #c9a961;
            text-decoration: none;
            transition: all 0.3s ease;
            padding: 10px 20px;
            border: 2px solid #c9a961;
            border-radius: 5px;
        }

        .back-link:hover {
            background-color: #c9a961;
            color: white;
        }

        /* Upload Section */
        .upload-section {
            background: white;
            padding: 30px;
            border-radius: 10px;
            margin-bottom: 40px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .upload-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 18px;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 20px;
            text-align: center;
            color: #c9a961;
        }

        .upload-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-width: 500px;
            margin: 0 auto;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-family: 'Montserrat', sans-serif;
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #2a2a2a;
            font-weight: 500;
        }

        .form-group input[type="text"] {
            padding: 12px;
            border: 2px solid #e0d9c8;
            border-radius: 5px;
            font-family: 'Cormorant Garamond', serif;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .form-group input[type="text"]:focus {
            outline: none;
            border-color: #c9a961;
        }

        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            width: 100%;
        }

        .file-input-button {
            background-color: #c9a961;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-family: 'Montserrat', sans-serif;
            font-size: 13px;
            letter-spacing: 2px;
            text-transform: uppercase;
            width: 100%;
            transition: all 0.3s;
        }

        .file-input-button:hover {
            background-color: #b89451;
        }

        .file-input-wrapper input[type="file"] {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        .file-name {
            font-size: 14px;
            color: #666;
            margin-top: 8px;
            text-align: center;
        }

        .preview-image {
            max-width: 100%;
            max-height: 300px;
            border-radius: 5px;
            margin-top: 15px;
            display: none;
        }

        .upload-button {
            background-color: #c9a961;
            color: white;
            padding: 15px 40px;
            border: 2px solid #c9a961;
            border-radius: 5px;
            cursor: pointer;
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
            letter-spacing: 3px;
            text-transform: uppercase;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .upload-button:hover {
            background-color: transparent;
            color: #c9a961;
        }

        .upload-button:disabled {
            background-color: #ccc;
            border-color: #ccc;
            cursor: not-allowed;
        }

        .success-message,
        .error-message {
            padding: 15px;
            border-radius: 5px;
            margin-top: 15px;
            text-align: center;
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
            display: none;
        }

        .success-message {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .error-message {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        /* Gallery Grid */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            margin-top: 40px;
        }

        @media (max-width: 768px) {
            .gallery {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 15px;
            }
        }

        .gallery-item {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }

        .gallery-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(201, 169, 97, 0.3);
        }

        .gallery-image {
            width: 100%;
            height: 280px;
            object-fit: cover;
            display: block;
        }

        @media (max-width: 768px) {
            .gallery-image {
                height: 200px;
            }
        }

        .gallery-info {
            padding: 15px;
            text-align: center;
        }

        .gallery-name {
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #c9a961;
            font-weight: 500;
        }

        .loading {
            text-align: center;
            padding: 40px;
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
            letter-spacing: 2px;
            color: #666;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(201, 169, 97, 0.3);
            border-radius: 50%;
            border-top-color: #c9a961;
            animation: spin 0.8s linear infinite;
            margin-left: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            justify-content: center;
            align-items: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            position: relative;
            max-width: 90%;
            max-height: 90%;
        }

        .modal-image {
            max-width: 100%;
            max-height: 90vh;
            border-radius: 5px;
        }

        .modal-close {
            position: absolute;
            top: -40px;
            right: 0;
            width: 40px;
            height: 40px;
            background: #c9a961;
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .modal-close:hover {
            background: #b89451;
            transform: rotate(90deg);
        }

        .modal-name {
            text-align: center;
            color: white;
            font-family: 'Montserrat', sans-serif;
            font-size: 16px;
            letter-spacing: 2px;
            margin-top: 15px;
        }

        .empty-gallery {
            text-align: center;
            padding: 60px 20px;
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
            letter-spacing: 2px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="title">Galería de Fotos</div>
            <div class="subtitle">Lucre y Nico - 06.03.26</div>
            <a href="index.html" class="back-link">← Volver a la invitación</a>
        </div>

        <!-- Upload Section -->
        <div class="upload-section">
            <div class="upload-title">📸 Compartí tu foto</div>
            <form class="upload-form" id="uploadForm">
                <div class="form-group">
                    <label for="userName">Tu nombre</label>
                    <input type="text" id="userName" required placeholder="Ingresá tu nombre">
                </div>
                <div class="form-group">
                    <label>Seleccioná una foto</label>
                    <div class="file-input-wrapper">
                        <button type="button" class="file-input-button">📷 Elegir foto</button>
                        <input type="file" id="photoFile" accept="image/*" required>
                    </div>
                    <div class="file-name" id="fileName"></div>
                </div>
                <img id="preview" class="preview-image" alt="Vista previa">
                <button type="submit" class="upload-button" id="uploadButton">✨ Subir foto</button>
                <div class="success-message" id="successMessage">¡Foto subida exitosamente! 🎉</div>
                <div class="error-message" id="errorMessage">Error al subir la foto. Intentá nuevamente.</div>
            </form>
        </div>

        <!-- Gallery Grid -->
        <div class="loading" id="loading">
            Cargando fotos<span class="spinner"></span>
        </div>
        <div class="gallery" id="gallery"></div>
        <div class="empty-gallery" id="emptyGallery" style="display: none;">
            Todavía no hay fotos. ¡Sé el primero en compartir! 📸
        </div>
    </div>

    <!-- Modal for full image -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <button class="modal-close" id="modalClose">&times;</button>
            <img id="modalImage" class="modal-image" alt="Foto ampliada">
            <div class="modal-name" id="modalName"></div>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN - Reemplazá estos valores con los tuyos de Cloudinary
        const CLOUDINARY_CLOUD_NAME = 'dcijhsehj';
        const CLOUDINARY_UPLOAD_PRESET = 'boda_lucre_nico'; // Tenés que crear este preset en Cloudinary
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxHNjpcfyjkYSvi1QxeyeqR836GHJQJe9RDATHKByAzDV5UKknJj6iDGpBMV4Ab0KLI/exec';

        // Elements
        const uploadForm = document.getElementById('uploadForm');
        const photoFile = document.getElementById('photoFile');
        const userName = document.getElementById('userName');
        const uploadButton = document.getElementById('uploadButton');
        const preview = document.getElementById('preview');
        const fileName = document.getElementById('fileName');
        const successMessage = document.getElementById('successMessage');
        const errorMessage = document.getElementById('errorMessage');
        const gallery = document.getElementById('gallery');
        const loading = document.getElementById('loading');
        const emptyGallery = document.getElementById('emptyGallery');
        const modal = document.getElementById('modal');
        const modalImage = document.getElementById('modalImage');
        const modalName = document.getElementById('modalName');
        const modalClose = document.getElementById('modalClose');

        // File input preview
        photoFile.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                fileName.textContent = file.name;
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        });

        // Upload form
        uploadForm.addEventListener('submit', async function(e) {
            e.preventDefault();

            const file = photoFile.files[0];
            const name = userName.value.trim();

            if (!file || !name) {
                errorMessage.textContent = 'Por favor completá todos los campos';
                errorMessage.style.display = 'block';
                setTimeout(() => errorMessage.style.display = 'none', 3000);
                return;
            }

            // Validate file size (max 10MB)
            if (file.size > 10 * 1024 * 1024) {
                errorMessage.textContent = 'La foto es muy pesada. Máximo 10MB';
                errorMessage.style.display = 'block';
                setTimeout(() => errorMessage.style.display = 'none', 3000);
                return;
            }

            uploadButton.disabled = true;
            uploadButton.innerHTML = 'Subiendo<span class="spinner"></span>';
            successMessage.style.display = 'none';
            errorMessage.style.display = 'none';

            try {
                // Upload to Cloudinary
                const formData = new FormData();
                formData.append('file', file);
                formData.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);
                formData.append('folder', 'boda-lucre-nico');

                const cloudinaryResponse = await fetch(
                    `https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/image/upload`,
                    {
                        method: 'POST',
                        body: formData
                    }
                );

                if (!cloudinaryResponse.ok) {
                    throw new Error('Error al subir imagen a Cloudinary');
                }

                const cloudinaryData = await cloudinaryResponse.json();

                // Save metadata to Google Sheets
                const photoData = {
                    type: 'photo',
                    nombre: name,
                    url: cloudinaryData.secure_url,
                    publicId: cloudinaryData.public_id,
                    timestamp: new Date().toISOString()
                };

                await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(photoData)
                });

                // Success!
                successMessage.style.display = 'block';
                uploadForm.reset();
                preview.style.display = 'none';
                fileName.textContent = '';

                // Reload gallery
                setTimeout(() => {
                    successMessage.style.display = 'none';
                    loadGallery();
                }, 2000);

            } catch (error) {
                console.error('Error:', error);
                errorMessage.textContent = 'Error al subir la foto. Intentá nuevamente.';
                errorMessage.style.display = 'block';
            } finally {
                uploadButton.disabled = false;
                uploadButton.innerHTML = '✨ Subir foto';
            }
        });

        // Load gallery from Google Sheets usando JSONP
        function loadGallery() {
            console.log('Iniciando carga de galería...');
            loading.style.display = 'block';
            gallery.innerHTML = '';
            emptyGallery.style.display = 'none';

            // Función callback global
            window.handlePhotosResponse = function(photos) {
                console.log('Respuesta recibida:', photos);
                loading.style.display = 'none';

                if (!photos || photos.length === 0) {
                    console.log('No hay fotos para mostrar');
                    emptyGallery.style.display = 'block';
                    return;
                }

                console.log('Mostrando', photos.length, 'fotos');
                photos.forEach(photo => {
                    const item = document.createElement('div');
                    item.className = 'gallery-item';
                    item.innerHTML = `
                        <img src="${photo.url}" alt="${photo.nombre}" class="gallery-image">
                        <div class="gallery-info">
                            <div class="gallery-name">${photo.nombre}</div>
                        </div>
                    `;
                    item.addEventListener('click', () => openModal(photo));
                    gallery.appendChild(item);
                });
            };

            // JSONP request
            const script = document.createElement('script');
            const url = `${GOOGLE_SCRIPT_URL}?callback=handlePhotosResponse`;
            console.log('URL de carga:', url);
            script.src = url;
            script.onerror = function(e) {
                console.error('Error al cargar el script:', e);
                loading.style.display = 'none';
                emptyGallery.textContent = 'Error al cargar las fotos. Recargá la página.';
                emptyGallery.style.display = 'block';
            };
            document.body.appendChild(script);
        }

        // Open modal
        function openModal(photo) {
            modalImage.src = photo.url;
            modalName.textContent = `Foto de ${photo.nombre}`;
            modal.classList.add('show');
        }

        // Close modal
        modalClose.addEventListener('click', () => {
            modal.classList.remove('show');
        });

        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                modal.classList.remove('show');
            }
        });

        // Load gallery on page load
        loadGallery();
    </script>
</body>
</html>
